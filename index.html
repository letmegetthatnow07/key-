<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combined Graduate Level Examination 2025 Tier II</title>
  <link href="https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: #ffffff;
      border-bottom: 5px solid #e8c030;
      padding: 8px 0 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .header img.logo {
      height: 82px;
      width: auto;
      display: block;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1;
    }

    .header-text .ssc-title {
      font-size: 30px;
      font-weight: 700;
      color: #1a3a8c;
      letter-spacing: 0.5px;
      font-family: Arial, sans-serif;
      margin-bottom: 4px;
    }

    .header-text .ssc-sub {
      font-size: 18px;
      font-weight: 400;
      color: #1a3a8c;
      font-family: Arial, sans-serif;
    }

    /* ── BLUE MAIN AREA ── */
    .main-area {
      background: #5b9bd5;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px 48px;
    }

    /* ── WHITE LOGIN BOX ── */
    .login-box {
      background: #ffffff;
      width: 100%;
      max-width: 516px;
      border-radius: 3px;
      box-shadow: 3px 3px 16px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .login-box-header {
      background: #ddeeff;
      padding: 16px 20px 14px;
      text-align: center;
      border-bottom: 1px solid #bbd3ee;
    }

    .login-box-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: 1.5px;
      font-family: Arial, sans-serif;
    }

    .login-box-body {
      padding: 18px 38px 26px;
    }

    /* ── TOP ERROR ── */
    .error-msg {
      color: #cc0000;
      font-size: 13.5px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }

    /* ── FIELD GROUPS ── */
    .field-group { margin-bottom: 14px; }

    .field-group label {
      display: block;
      font-size: 12.5px;
      color: #333;
      margin-bottom: 4px;
      font-family: Arial, sans-serif;
    }

    .field-group label .req { color: #cc0000; margin-left: 1px; }

    .field-group input {
      width: 100%;
      padding: 9px 11px;
      font-size: 13px;
      border: 1px solid #cccccc;
      border-radius: 3px;
      color: #555;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }
    .field-group input:focus { border-color: #5b9bd5; }
    .field-group input.err { border-color: #cc0000; background: #fff5f5; }

    .field-err-text {
      color: #cc0000;
      font-size: 12px;
      margin-top: 3px;
      display: none;
    }

    /* ── CAPTCHA ── */
    .captcha-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 4px;
    }

    .captcha-row {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    #captchaCanvas {
      display: block;
      width: 195px;
      height: 52px;
      border-radius: 2px;
    }

    .captcha-refresh {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #444;
      padding: 0 5px;
      line-height: 1;
    }
    .captcha-refresh:hover { color: #1a3a8c; }

    .captcha-input-wrap { margin-top: 5px; }
    .captcha-input-wrap input {
      width: 195px;
      padding: 7px 10px;
      font-size: 12.5px;
      border: 1px solid #aaa;
      border-radius: 3px;
      outline: none;
      color: #333;
    }
    .captcha-input-wrap input:focus { border-color: #5b9bd5; }

    /* ── HELP ── */
    .help-icon {
      text-align: center;
      margin: 5px 0 10px;
      color: #555;
      font-size: 19px;
      cursor: default;
    }

    /* ── LOGIN BUTTON ── */
    .login-btn-wrap { display: flex; justify-content: center; margin-top: 2px; }

    .login-btn {
      background: #5b9bd5;
      color: #fff;
      border: none;
      padding: 10px 46px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.3px;
      font-family: Arial, sans-serif;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #4a87c0; }

    /* ── FOOTER ── */
    .login-box-footer {
      background: #ddeeff;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #bbd3ee;
      font-size: 13px;
      color: #333;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

    <div class="header-text">
      <span class="ssc-title">STAFF SELECTION COMMISSION</span>
      <span class="ssc-sub">(Government of India)</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="login-box">

      <div class="login-box-header">
        <h2>CANDIDATE LOGIN</h2>
      </div>

      <div class="login-box-body">

        <div class="error-msg" id="incorrectCredsMsg">* Incorrect Credentials.</div>

        <!-- Roll Number -->
        <div class="field-group">
          <label>Roll number ( As per Admission Certificate)<span class="req">*</span></label>
          <input type="text" id="rollInput" placeholder="Enter Roll number" autocomplete="off" />
          <div class="field-err-text" id="rollError">Please enter the Roll number.</div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label>Password (As per Admission Certificate)<span class="req">*</span></label>
          <input type="password" id="passInput" placeholder="Enter Password" autocomplete="off" />
          <div class="field-err-text" id="passError">Please enter the Password.</div>
        </div>

        <!-- CAPTCHA -->
        <div class="captcha-section">
          <div class="captcha-row">
            <canvas id="captchaCanvas" width="195" height="52"></canvas>
            <button class="captcha-refresh" id="refreshCaptcha" title="Refresh">&#x21BB;</button>
          </div>
          <div class="captcha-input-wrap">
            <input type="text" id="captchaInput" placeholder="Type numbers as shown in image" maxlength="8" autocomplete="off" />
          </div>
        </div>

        <div class="help-icon">&#x2753;</div>

        <div class="login-btn-wrap">
          <button class="login-btn" id="loginBtn">Login</button>
        </div>

      </div>

      <div class="login-box-footer">Version 15.03.01</div>
    </div>
  </div>

  <script>
    // ── CAPTCHA ──────────────────────────────────────
    let captchaCode = '';

    function generateCaptcha() {
      captchaCode = Math.floor(100000 + Math.random() * 900000).toString();
      drawCaptcha(captchaCode);
    }

    function drawCaptcha(code) {
      const canvas = document.getElementById('captchaCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;

      // Gradient: yellow → green → teal
      const grad = ctx.createLinearGradient(0, 0, w, 0);
      grad.addColorStop(0,    '#f5e800');
      grad.addColorStop(0.45, '#a0e840');
      grad.addColorStop(1,    '#28c8c0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Noise lines
      for (let i = 0; i < 5; i++) {
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(Math.random() * w, Math.random() * h);
        ctx.lineTo(Math.random() * w, Math.random() * h);
        ctx.stroke();
      }

      // Horizontal scratch
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(6, h * 0.63);
      ctx.lineTo(w - 6, h * 0.63 + (Math.random() * 3 - 1));
      ctx.stroke();

      // Digits
      ctx.font = 'bold 30px Arial';
      ctx.fillStyle = '#111';
      ctx.textBaseline = 'middle';
      let x = 8;
      for (let i = 0; i < code.length; i++) {
        ctx.save();
        ctx.translate(x + 14, h / 2 + (Math.random() - 0.5) * 5);
        ctx.rotate((Math.random() - 0.5) * 0.22);
        ctx.fillText(code[i], -7, 0);
        ctx.restore();
        x += 29;
      }
    }

    document.getElementById('refreshCaptcha').addEventListener('click', function () {
      generateCaptcha();
      document.getElementById('captchaInput').value = '';
    });

    generateCaptcha();

    // ── LOGIN ─────────────────────────────────────────
    const CORRECT_ROLL = '3206022224';
    const CORRECT_PASS = '06081997';
    const PDF_URL = 'https://raw.githubusercontent.com/letmegetthatnow07/portfolio-dashboard/main/3206022224.pdf';

    function clearErrors() {
      document.getElementById('incorrectCredsMsg').style.display = 'none';
      ['rollInput','passInput'].forEach(id => {
        document.getElementById(id).classList.remove('err');
      });
      document.getElementById('rollError').style.display = 'none';
      document.getElementById('passError').style.display = 'none';
    }

    document.getElementById('loginBtn').addEventListener('click', function () {
      clearErrors();
      const roll = document.getElementById('rollInput').value.trim();
      const pass = document.getElementById('passInput').value.trim();
      const cap  = document.getElementById('captchaInput').value.trim();

      const noRoll = roll === '';
      const noPass = pass === '';

      if (noRoll || noPass) {
        document.getElementById('incorrectCredsMsg').style.display = 'block';
        if (noRoll) {
          document.getElementById('rollInput').classList.add('err');
          document.getElementById('rollError').style.display = 'block';
        }
        if (noPass) {
          document.getElementById('passInput').classList.add('err');
          document.getElementById('passError').style.display = 'block';
        }
        generateCaptcha();
        document.getElementById('captchaInput').value = '';
        return;
      }

      if (cap !== captchaCode) {
        document.getElementById('incorrectCredsMsg').style.display = 'block';
        generateCaptcha();
        document.getElementById('captchaInput').value = '';
        return;
      }

      if (roll === CORRECT_ROLL && pass === CORRECT_PASS) {
        const a = document.createElement('a');
        a.href = PDF_URL;
        a.download = '3206022224.pdf';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else {
        document.getElementById('incorrectCredsMsg').style.display = 'block';
        document.getElementById('rollInput').classList.add('err');
        document.getElementById('passInput').classList.add('err');
        generateCaptcha();
        document.getElementById('captchaInput').value = '';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
